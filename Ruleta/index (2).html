<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ruleta TTNB – Liga Deportiva</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="scene">

  <!-- Panel Izquierdo -->
  <div class="panel panel-left">
    <div class="logo-title">RIFA<br></div>
    <div class="logo-sub">LIGA</div>
    <div class="sep sep-celeste"></div>
    <div class="hist-label">ÚLTIMOS</div>
    <ul class="hist-list" id="histList"></ul>
  </div>

  <!-- Ruleta -->
  <div class="wheel-wrap" id="wheelWrap">
    <div id="ticker">
      <div class="tick-body"></div>
      <div class="tick-tip"></div>
    </div>
    <canvas id="wc"></canvas>
    <button id="spinBtn" onclick="spin()">
      <span class="spin-lbl">GIRAR</span>
    </button>
  </div>

  <!-- Panel Derecho -->
  <div class="panel panel-right">
    <div class="curr-label">NÚMERO ACTUAL</div>
    <div class="curr-num" id="currNum">–</div>
    <div class="sep sep-gold"></div>
    <div class="stats">
      <div class="stat">
        <span class="stat-k">GIROS</span>
        <span class="stat-v" id="sGiros">0</span>
      </div>
      <div class="stat">
        <span class="stat-k">MAX</span>
        <span class="stat-v" id="sMax">–</span>
      </div>
      <div class="stat">
        <span class="stat-k">MIN</span>
        <span class="stat-v" id="sMin">–</span>
      </div>
    </div>
    <button class="reset-btn" onclick="resetGame()">REINICIAR</button>
  </div>

</div>

<!-- Overlay número grande -->
<div id="overlay">
  <span id="overlayNum"></span>
</div>

<script src="roulette.js"></script>
</body>
</html>
